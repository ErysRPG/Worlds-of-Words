<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./styles/styles.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM" crossorigin="anonymous"></script>
    <title>Worlds of Words</title>
    <title>Worlds of Words - Generator</title>
</head>

<body>
    <nav class="navbar navbar-expand-lg navbar-light bg-light">
  <div class="container-fluid">

    <div class="collapse navbar-collapse justify-content-center" id="navbarSupportedContent">
      <ul class="navbar-nav  mb-2 mb-lg-0 d-flex ">
        <li class="nav-item">
          <a class="nav-link" href="index.html">Home</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" href="generator.html">Generator</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" href="about-me.html">About Me</a>
        </li>
      </ul>
    </div>
  </div>
</nav>
    <div class="main-content">

        <h1>Worlds of Words - Generator</h1>
        <br>
        <label for="language-select">Select a language:</label>
        <select value="languages" id="language-select">
            <option value="lang-elvish">Fae and Elvish</option>
            <option value="lang-dwarvish">Dwarvish and Gnomish</option>
            <option value="lang-draconic">Draconic and Infernal</option>
            <option value="lang-alien">Alien</option>
            <option value="custom-lang">Custom Language</option>
        </select>
        <br>
        <div class="settings">
            <label for="sentence-count">Number of sentences:</label>
            <input type="number" id="sentence-count" name="sentence-count" min="1" max="100" value="5">

            <label for="paragraph-count">Number of paragraphs:</label>
            <input type="number" id="paragraph-count" name="paragraph-count" min="1" max="100" value="5">
        </div>
        <br>
        <div class="custom-lang-settings">
            <label for="custom-lang-sounds">Custom Language settings</label>
            <br><br>
            <textarea id="custom-lang-sounds" name="custom-lang-sounds"
                placeholder="Enter characters separated by a space, e.g., a a' ê ö b th kh t s rr ñ..."></textarea>
            <textarea id="custom-lang-syllables" name="custom-lang-syllables"
                placeholder="Enter syllables separated by a space, e.g., CV CVC VCC CCVCC... where C = Consonant, V = Vowel"></textarea>
        </div>
        
        <button class="generate-btn">Generate</button>
        <br><br>
        <label for="file-input">Upload a json file with custom language sounds and syllables:</label>
        <input type="file" id="file-input" accept=".json" />
        <br>
        <br>
        <label for="download-link">Or download a template json file to store your own custom language:</label>
        <br>
        <a href="#" class="text-link" id="download-link" download>Download language</a>
        <br><br>
         <h2>Generated output:</h2>
        <div class="output">
               
        </div>
        <br>
        <button class="generate-btn">Generate</button>
        <button id="copy-btn">Copy output</button>

    </div>

     <!-- JavaScript -->
    <script src="app-logic/generatorLogic.js" type="module"></script>
</body>
</html>
